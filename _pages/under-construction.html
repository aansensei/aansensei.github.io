<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07051a;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }
    canvas { position: fixed; inset: 0; pointer-events: none; }
    #stars-canvas  { z-index: 0; }
    #rhythm-canvas { z-index: 1; }

    #hit-line-el {
      position: fixed; left: 50%; transform: translateX(-50%);
      width: min(540px, 92vw); height: 3px;
      z-index: 3; pointer-events: none; border-radius: 2px;
      background: linear-gradient(to right,
        transparent, rgba(201,162,39,.5) 12%,
        rgba(255,224,120,1) 50%,
        rgba(201,162,39,.5) 88%, transparent);
      box-shadow: 0 0 10px rgba(255,220,80,.9), 0 0 30px rgba(201,162,39,.6), 0 0 70px rgba(201,162,39,.2);
      animation: hlPulse 1.6s ease-in-out infinite;
    }
    @keyframes hlPulse {
      0%,100%{opacity:.88;}
      50%{opacity:1;box-shadow:0 0 16px rgba(255,220,80,1),0 0 55px rgba(201,162,39,.8);}
    }
    .content {
      position: relative; z-index: 10;
      text-align: center; padding: 2rem 1.5rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 1.25rem;
      pointer-events: none;
    }
    .label {
      font-family: 'Cinzel Decorative', serif;
      font-size: .73rem; letter-spacing: .4em;
      color: #f5de7a;
      text-shadow: 0 0 16px rgba(245,210,80,.9), 0 0 36px rgba(201,162,39,.55);
      text-transform: uppercase;
    }
    .divider-line {
      width: 240px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,162,39,.65), transparent);
    }
    .title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.15rem, 3.5vw, 1.9rem);
      color: #f5ecd4;
      text-shadow: 0 0 24px rgba(240,200,80,.65), 0 0 60px rgba(201,162,39,.3), 0 2px 5px rgba(0,0,0,.95);
      line-height: 1.35; letter-spacing: .04em;
    }
    .subtitle {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      color: rgba(240,225,195,.82);
      letter-spacing: .07em; max-width: 440px; line-height: 1.75;
      text-shadow: 0 1px 8px rgba(0,0,0,.75);
    }
    .sticker {
      width: clamp(110px, 16vw, 165px);
      filter: drop-shadow(0 0 22px rgba(201,162,39,.4)) drop-shadow(0 4px 14px rgba(0,0,0,.6));
      animation: float 4s ease-in-out infinite; pointer-events: none;
    }
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}
    .ornament {
      font-family: 'Cinzel Decorative', serif;
      font-size: .72rem; color: rgba(201,162,39,.55); letter-spacing: .55em;
    }
    .btn-back {
      position: fixed; top: 1.4rem; left: 1.6rem; z-index: 20;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 1rem; color: rgba(240,220,160,.78);
      text-decoration: none; letter-spacing: .06em;
      border: 1px solid rgba(201,162,39,.22); padding: .35rem .9rem;
      border-radius: 20px; background: rgba(7,5,26,.65);
      backdrop-filter: blur(6px);
      transition: color .25s, border-color .25s, box-shadow .25s; cursor: pointer;
    }
    .btn-back::before{content:'\2190\00A0';}
    .btn-back:hover{color:#f0c84a;border-color:rgba(201,162,39,.55);box-shadow:0 0 14px rgba(201,162,39,.22);}
  </style>
</head>
<body>
  <canvas id="stars-canvas"></canvas>
  <canvas id="rhythm-canvas"></canvas>
  <div id="hit-line-el"></div>
  <a class="btn-back" onclick="history.length>1?history.back():window.location.href='/'" href="#">Return</a>
  <div class="content">
    <p class="label">A new tale is being written</p>
    <div class="divider-line"></div>
    <h1 class="title">Under Construction</h1>
    <p class="subtitle">This page is currently being crafted.<br>Stay tuned.</p>
    <img class="sticker" src="/assets/images/kanade-building-sticker.png" alt="Kanade building">
    <div class="divider-line"></div>
    <p class="ornament">* * *</p>
  </div>

<script>
/* ═══ STARFIELD ═══ */
(function(){
  const c=document.getElementById('stars-canvas'),x=c.getContext('2d');
  let W,H,st=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  function init(){st=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.15,a:Math.random(),da:(Math.random()*.005+.001)*(Math.random()>.5?1:-1)}));}
  function draw(){
    x.clearRect(0,0,W,H);
    for(const s of st){s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fillStyle=`rgba(255,245,220,${s.a*.8})`;x.fill();}
    requestAnimationFrame(draw);
  }
  resize();init();draw();
  window.addEventListener('resize',()=>{resize();init();});
})();

/* ═══ RHYTHM ENGINE — chart 0708 append, 160BPM, 6 lanes ═══ */
(function(){
  const cv=document.getElementById('rhythm-canvas'),ctx=cv.getContext('2d');
  let W,H;

  /* config */
  const LANES=6, NOTE_W=60, LANE_GAP=11, HIT_FRAC=.80;
  const LOOP_FRAMES=720;  /* 8 bars @ 160BPM 60fps */
  const TRAVEL_F=115;     /* frames note travels before hit */

  /*
    Original Sekai colors replaced with original fantasy palette
    to distinguish from the source game.
    Lane colors: gold, violet, rose-copper, aqua, crimson, silver-teal
  */
  const C=[
    {b:'#c9a227',g:'rgba(201,162,39,'},   // 0 gold
    {b:'#9b5cf6',g:'rgba(155,92,246,'},   // 1 violet
    {b:'#e07060',g:'rgba(224,112,96,'},   // 2 rose-copper
    {b:'#2dd4bf',g:'rgba(45,212,191,'},   // 3 aqua
    {b:'#c94f7c',g:'rgba(201,79,124,'},   // 4 crimson
    {b:'#7ec8c8',g:'rgba(126,200,200,'},  // 5 silver-teal
  ];
  const CRIT={b:'#fffde0',g:'rgba(255,253,224,'};

  /*
    Note schedule — hit frames derived from SVG y-coords of chart 0708/append
    Formula: frame = (2192 - svgY) / 2160 * 720
    Lane mapping: Math.round((svgX - 40) / 32), clamped 0-5
    Types: t=0 tap, t=2 flick
    Span s: 1=single, 1.5=1.5 lanes, 2=two lanes
    cr=1: critical (gold-white)
    fd: flick direction (1=up-right, -1=up-left) — set randomly below
  */
  const SCH=[
    /* A — 4 beats, lanes 0,2,3 (SVG y 18→-117) */
    {f:5, l:0,t:0,s:1},{f:5, l:2,t:0,s:1},{f:5, l:3,t:0,s:1.5},
    {f:20,l:0,t:0,s:1},{f:20,l:2,t:0,s:1},{f:20,l:3,t:0,s:1.5},
    {f:35,l:0,t:0,s:1},{f:35,l:2,t:0,s:1},{f:35,l:3,t:0,s:1.5},
    {f:50,l:0,t:0,s:1},{f:50,l:2,t:0,s:1},{f:50,l:3,t:0,s:1.5},
    /* B — flick pair + cascade singles (SVG y -252→-477) */
    {f:95, l:0,t:2,s:1.5},{f:95, l:4,t:2,s:1.5},
    {f:110,l:1,t:0,s:1},
    {f:125,l:2,t:0,s:1},
    {f:140,l:1,t:0,s:1},{f:140,l:3,t:0,s:1},
    {f:155,l:2,t:0,s:1},
    {f:170,l:3,t:0,s:1},
    /* C — 4×group, lanes 5,2,3+wide, 0-wide (SVG y 1638→1503) */
    {f:185,l:5,t:0,s:1},{f:185,l:2,t:0,s:1},{f:185,l:3,t:0,s:1.5},{f:185,l:0,t:0,s:2},
    {f:200,l:5,t:0,s:1},{f:200,l:2,t:0,s:1},{f:200,l:3,t:0,s:1.5},
    {f:215,l:5,t:0,s:1},{f:215,l:2,t:0,s:1},{f:215,l:3,t:0,s:1.5},
    {f:230,l:5,t:0,s:1},{f:230,l:2,t:0,s:1},{f:230,l:3,t:0,s:1.5},
    /* D — shift left, lanes 4,1,2+ (SVG y 1368→1233) */
    {f:275,l:4,t:0,s:1},{f:275,l:1,t:0,s:1},{f:275,l:2,t:0,s:1.5},
    {f:290,l:4,t:0,s:1},{f:290,l:1,t:0,s:1},{f:290,l:2,t:0,s:1.5},
    {f:305,l:4,t:0,s:1},{f:305,l:1,t:0,s:1},{f:305,l:2,t:0,s:1.5},
    {f:320,l:4,t:0,s:1},{f:320,l:1,t:0,s:1},{f:320,l:2,t:0,s:1.5},
    /* E — shift left, lanes 3,0,1+ (SVG y 1098→963) */
    {f:365,l:3,t:0,s:1},{f:365,l:0,t:0,s:1},{f:365,l:1,t:0,s:1.5},
    {f:380,l:3,t:0,s:1},{f:380,l:0,t:0,s:1},{f:380,l:1,t:0,s:1.5},
    {f:395,l:3,t:0,s:1},{f:395,l:0,t:0,s:1},{f:395,l:1,t:0,s:1.5},
    {f:410,l:3,t:0,s:1},{f:410,l:0,t:0,s:1},{f:410,l:1,t:0,s:1.5},
    /* F — wide specials (SVG y 828, 693) */
    {f:455,l:0,t:2,s:2},{f:455,l:4,t:0,s:2,cr:1},
    {f:500,l:4,t:2,s:2},{f:500,l:0,t:0,s:2,cr:1},
    /* G — repeat C (SVG y 558→423) */
    {f:545,l:5,t:0,s:1},{f:545,l:2,t:0,s:1},{f:545,l:3,t:0,s:1.5},{f:545,l:0,t:0,s:2},
    {f:560,l:5,t:0,s:1},{f:560,l:2,t:0,s:1},{f:560,l:3,t:0,s:1.5},
    {f:575,l:5,t:0,s:1},{f:575,l:2,t:0,s:1},{f:575,l:3,t:0,s:1.5},
    {f:590,l:5,t:0,s:1},{f:590,l:2,t:0,s:1},{f:590,l:3,t:0,s:1.5},
    /* H — repeat D (SVG y 288→153) */
    {f:635,l:4,t:0,s:1},{f:635,l:1,t:0,s:1},{f:635,l:2,t:0,s:1.5},
    {f:650,l:4,t:0,s:1},{f:650,l:1,t:0,s:1},{f:650,l:2,t:0,s:1.5},
    {f:665,l:4,t:0,s:1},{f:665,l:1,t:0,s:1},{f:665,l:2,t:0,s:1.5},
    {f:680,l:4,t:0,s:1},{f:680,l:1,t:0,s:1},{f:680,l:2,t:0,s:1.5},
  ];

  /* assign flick direction once */
  SCH.forEach(n=>{if(n.t===2)n.fd=(Math.random()>.5?1:-1);});
  const NS=SCH.map(()=>({fired:false}));

  /* ── geometry ── */
  function resize(){
    W=cv.width=innerWidth;H=cv.height=innerHeight;
    const el=document.getElementById('hit-line-el');
    if(el)el.style.bottom=(100-HIT_FRAC*100)+'%';
  }
  const hitY=()=>H*HIT_FRAC;
  const noteSpd=()=>hitY()/TRAVEL_F;
  function laneX(l){const tot=NOTE_W*LANES+LANE_GAP*(LANES-1);return(W-tot)/2+l*(NOTE_W+LANE_GAP)+NOTE_W/2;}
  function geom(l,s){
    const w=s*NOTE_W+(s-1)*LANE_GAP;
    const cx=laneX(l)+(s-1)*(NOTE_W+LANE_GAP)/2;
    return{cx,w};
  }

  /* ── FX ── */
  const FX={p:[],r:[],fl:[]};
  function spawnFX(l,s,isFlick){
    const{cx}=geom(l,s), y=hitY(), cb=C[l].b;
    for(let i=0;i<22;i++){
      const a=Math.random()*Math.PI*2, sp=Math.random()*4.5+1.2;
      FX.p.push({x:cx,y,vx:Math.cos(a)*sp*(isFlick?1.9:1),vy:Math.sin(a)*sp*(isFlick?1.9:1)-(isFlick?2.8:0),r:Math.random()*4.5+1.5,a:1,col:cb});
    }
    FX.r.push({x:cx,y,r:0,a:1,col:cb});
    FX.r.push({x:cx,y,r:0,a:.45,col:'#fff',dl:5});
    FX.fl.push({l,s,a:.65});
  }
  function updateFX(){
    FX.p.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.a-=.045;});
    FX.r.forEach(r=>{if(r.dl&&r.dl>0){r.dl--;return;}r.r+=8;r.a-=.075;});
    FX.fl.forEach(f=>f.a-=.055);
    FX.p=FX.p.filter(e=>e.a>0);FX.r=FX.r.filter(e=>e.a>0);FX.fl=FX.fl.filter(e=>e.a>0);
  }
  function drawFX(){
    FX.p.forEach(p=>{
      ctx.save();ctx.globalAlpha=Math.max(0,p.a);
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.col;ctx.shadowBlur=10;ctx.shadowColor=p.col;ctx.fill();ctx.restore();
    });
    FX.r.forEach(r=>{
      if(r.dl&&r.dl>0)return;
      ctx.save();ctx.globalAlpha=Math.max(0,r.a);
      ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
      ctx.strokeStyle=r.col;ctx.lineWidth=2.5;ctx.shadowBlur=14;ctx.shadowColor=r.col;ctx.stroke();ctx.restore();
    });
    FX.fl.forEach(f=>{
      const{cx,w}=geom(f.l,f.s),hy=hitY();
      ctx.save();ctx.globalAlpha=Math.max(0,f.a);
      const g=ctx.createLinearGradient(cx,0,cx,hy);
      g.addColorStop(0,'transparent');g.addColorStop(1,C[f.l].g+'.32)');
      ctx.fillStyle=g;ctx.fillRect(cx-w/2,0,w,hy);ctx.restore();
    });
  }

  /* ── note drawing ── */
  const NOTE_H=20;

  function drawPill(cx,y,w,h,col,crit){
    const r=h/2;
    ctx.save();ctx.shadowBlur=crit?34:22;ctx.shadowColor=col.b;
    ctx.beginPath();
    ctx.moveTo(cx-w/2+r,y);
    ctx.arcTo(cx+w/2,y,   cx+w/2,y+h,r);
    ctx.arcTo(cx+w/2,y+h, cx-w/2,y+h,r);
    ctx.arcTo(cx-w/2,y+h, cx-w/2,y,  r);
    ctx.arcTo(cx-w/2,y,   cx+w/2,y,  r);
    ctx.closePath();
    const g=ctx.createLinearGradient(cx-w/2,y,cx+w/2,y+h);
    if(crit){g.addColorStop(0,'#fff');g.addColorStop(.35,'#ffe570');g.addColorStop(1,'#e09800');}
    else{g.addColorStop(0,col.b);g.addColorStop(.4,'#fff');g.addColorStop(1,col.b);}
    ctx.fillStyle=g;ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle=crit?'rgba(255,255,255,.6)':'rgba(255,255,255,.28)';
    ctx.beginPath();ctx.rect(cx-w/2+7,y+4,w-14,h*.27);ctx.fill();
    ctx.restore();
  }

  function drawFlick(cx,y,w,h,col,dir){
    const hw=w*.48,hh=h*1.18;
    ctx.save();
    ctx.shadowBlur=32;ctx.shadowColor=col.b;
    ctx.beginPath();
    ctx.moveTo(cx,y-hh);ctx.lineTo(cx+hw,y);
    ctx.lineTo(cx,y+hh);ctx.lineTo(cx-hw,y);ctx.closePath();
    const dg=ctx.createRadialGradient(cx,y,0,cx,y,hw);
    dg.addColorStop(0,col.b);dg.addColorStop(.5,col.g+'.88)');dg.addColorStop(1,col.g+'.2)');
    ctx.fillStyle=dg;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.2;ctx.shadowBlur=0;ctx.stroke();
    const ax=cx+dir*(hw+4),ay=y-hh*.22,len=22;
    ctx.strokeStyle=col.b;ctx.lineWidth=2.8;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.shadowBlur=12;ctx.shadowColor=col.b;
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+dir*len,ay-len);ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ax+dir*len,ay-len);ctx.lineTo(ax+dir*len-dir*9,ay-len);
    ctx.moveTo(ax+dir*len,ay-len);ctx.lineTo(ax+dir*len,ay-len+9);
    ctx.stroke();ctx.restore();
  }

  /* ── lane tracks ── */
  function drawTracks(){
    for(let l=0;l<LANES;l++){
      const cx=laneX(l),hy=hitY();
      ctx.save();
      const g=ctx.createLinearGradient(cx,0,cx,H);
      g.addColorStop(0,'rgba(255,255,255,0)');
      g.addColorStop(.38,C[l].g+'.04)');
      g.addColorStop(.83,C[l].g+'.12)');
      g.addColorStop(1,C[l].g+'.04)');
      ctx.strokeStyle=g;ctx.lineWidth=NOTE_W+LANE_GAP;
      ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
      ctx.setLineDash([5,11]);ctx.strokeStyle=C[l].g+'.08)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,hy);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    }
  }

  /* ── hit dots ── */
  function drawHitDots(t){
    for(let l=0;l<LANES;l++){
      const cx=laneX(l),hy=hitY(),p=.7+.3*Math.sin(t*.07+l*.75);
      ctx.save();ctx.globalAlpha=p;
      ctx.beginPath();ctx.arc(cx,hy,7*p,0,Math.PI*2);
      ctx.fillStyle=C[l].b;ctx.shadowBlur=20;ctx.shadowColor=C[l].b;ctx.fill();
      ctx.globalAlpha=p*.32;
      ctx.beginPath();ctx.arc(cx,hy,15*p,0,Math.PI*2);
      ctx.strokeStyle=C[l].b;ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
    }
  }

  /* ── main loop ── */
  let gt=0;
  function loop(){
    ctx.clearRect(0,0,W,H);
    drawTracks();
    updateFX();drawFX();

    const hy=hitY(),spd=noteSpd(),gmod=gt%LOOP_FRAMES;

    for(let i=0;i<SCH.length;i++){
      const n=SCH[i],ns=NS[i];
      let raw=((n.f-gmod)+LOOP_FRAMES)%LOOP_FRAMES;
      const delta=raw>LOOP_FRAMES*.65?raw-LOOP_FRAMES:raw;

      if(delta>TRAVEL_F*.5)ns.fired=false;
      if(!ns.fired&&delta<=1&&delta>-8){
        ns.fired=true;spawnFX(n.l,n.s||1,n.t===2);
      }

      const y=hy-delta*spd;
      if(y<-NOTE_H-60||y>hy+NOTE_H+4)continue;

      ctx.save();ctx.beginPath();ctx.rect(0,0,W,hy+2);ctx.clip();
      const{cx,w}=geom(n.l,n.s||1);
      const col=n.cr?CRIT:C[n.l];
      if(n.t===2)drawFlick(cx,y,w,NOTE_H,col,n.fd||1);
      else drawPill(cx,y,w,NOTE_H,col,!!n.cr);
      ctx.restore();
    }

    drawHitDots(gt);
    gt++;
    requestAnimationFrame(loop);
  }

  resize();loop();
  window.addEventListener('resize',resize);
})();
</script>
</body>
</html>
