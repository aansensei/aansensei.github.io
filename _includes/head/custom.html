<script>
  document.addEventListener('DOMContentLoaded', function() {
    var avatarImg = document.querySelector('.author__avatar img');
    if (!avatarImg) return;
    var link = avatarImg.closest('a');
    if (link) {
      link.href = '/hubble/';
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
    }

    // ring trang trí xoay quanh avatar
    var av = avatarImg.closest('.author__avatar');
    if (!av || !link) return;

    var wrap = document.createElement('span');
    wrap.style.cssText = 'position:relative;display:inline-block;line-height:0;';
    link.parentNode.insertBefore(wrap, link);
    wrap.appendChild(link);
    link.style.cssText += ';position:relative;z-index:1;display:inline-block;';
    avatarImg.style.setProperty('margin-bottom', '0', 'important');

    var S = 200, CX = 100, CY = 100;
    var gld = 'rgba(212,175,55,';

    function circ(r, col, sw, da) {
      return '<circle cx="' + CX + '" cy="' + CY + '" r="' + r + '" fill="none" stroke="' + col + '" stroke-width="' + (sw || 1) + '"' + (da ? ' stroke-dasharray="' + da + '"' : '') + '/>';
    }

    // 2 vòng vàng tĩnh
    var staticRings = circ(63, gld + '0.9)', 2) + circ(75, gld + '0.9)', 2);

    // nhóm xoay 48s, 12 ✦
    var rg = [];
    rg.push(circ(69, gld + '0.18)', 0.5, '1 5'));
    for (var i = 0; i < 12; i++) {
      var th = (i / 12) * Math.PI * 2;
      var dx = CX + 69 * Math.cos(th), dy = CY + 69 * Math.sin(th);
      var big = i % 3 === 0;
      rg.push('<text x="' + dx.toFixed(1) + '" y="' + dy.toFixed(1) + '" text-anchor="middle" dominant-baseline="central" font-size="' + (big ? '7' : '4') + '" fill="' + gld + (big ? '0.88' : '0.5') + ')" font-family="serif">✦</text>');
    }

    var RG = '<g><animateTransform attributeName="transform" type="rotate" from="0 ' + CX + ' ' + CY + '" to="360 ' + CX + ' ' + CY + '" dur="48s" repeatCount="indefinite"/>' + rg.join('') + '</g>';

    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 ' + S + ' ' + S);
    svg.id = 'an-avatar-ring';
    svg.style.cssText = 'position:absolute;top:50%;left:50%;width:200px;height:200px;margin-top:-100px;margin-left:-100px;pointer-events:none;z-index:2;overflow:visible;';
    svg.innerHTML = staticRings + RG;
    wrap.appendChild(svg);
  });
</script>

  *::before,

<script>
  /* khởi tạo theme sớm, tránh flash */
  (function () {
    try {
      var KTHEME = 'an_theme', KTS = 'an_ts', KACT = 'an_act', TTL = 300000;
      var now = Date.now();
      var act = +sessionStorage.getItem(KACT) || 0;

      if (act && now - act > TTL) {
        sessionStorage.removeItem(KTHEME);
        sessionStorage.removeItem(KTS);
      }
      var sv = sessionStorage.getItem(KTHEME);
      var ts = +sessionStorage.getItem(KTS) || 0;
      var isDay = (sv === 'day' && now - ts < TTL);
      sessionStorage.setItem(KACT, now);

      function applyTheme() {
        if (!document.body) return false;

        if (isDay) document.body.classList.add('an-day-mode');
        else document.body.classList.remove('an-day-mode');

        void document.body.offsetHeight;

        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            var blocker = document.getElementById('an-theme-blocker');
            if (blocker) blocker.remove();
          });
        });
        return true;
      }

      if (!applyTheme()) {
        var obs = new MutationObserver(function () {
          if (document.body) {
            applyTheme();
            obs.disconnect();
          }
        });
        obs.observe(document.documentElement, { childList: true });
        document.addEventListener('DOMContentLoaded', applyTheme);
      }
    } catch (e) { }
  })();
</script>

          ctx.rotate(Math.PI / 8); ctx.strokeStyle = 'rgba(255, 240, 180, 0.9)'; ctx.lineWidth = 1.5; var rayLen = R * 1.5 * stretch6; ctx.beginPath(); ctx.moveTo(0, -R * 0.5); ctx.lineTo(0, -rayLen); ctx.stroke();
          ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -rayLen, R * 0.05, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        } ctx.restore();
        ctx.fillStyle = 'rgba(255, 245, 200, 1)'; ctx.shadowBlur = 25; ctx.shadowColor = '#ffaa00'; ctx.beginPath(); ctx.arc(0, 0, R * 0.65, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
        ctx.save(); ctx.rotate(nt * 0.015); ctx.strokeStyle = 'rgba(220, 120, 10, 0.8)'; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.arc(0, 0, R * 0.45, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([3, 5]); ctx.beginPath(); ctx.arc(0, 0, R * 0.35, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255, 140, 0, 0.9)';
        for (var i = 0; i < 8; i++) { ctx.rotate(Math.PI / 4); ctx.beginPath(); ctx.moveTo(0, -R * 0.08); ctx.lineTo(R * 0.06, -R * 0.08); ctx.lineTo(0, -R * 0.28); ctx.lineTo(-R * 0.06, -R * 0.08); ctx.closePath(); ctx.fill(); } ctx.restore();
        ctx.fillStyle = '#fff';
        for (var m = 0; m < 12; m++) { var am = nt * 0.5 + m * (Math.PI * 2 / 12), dist = R * 1.3 + Math.sin(nt * 2.5 + m) * R * 0.4; ctx.globalAlpha = sunOp * (0.3 + 0.7 * Math.abs(Math.sin(nt * 3 + m))); ctx.beginPath(); ctx.arc(Math.cos(am) * dist, Math.sin(am) * dist, 1.5 + Math.random(), 0, Math.PI * 2); ctx.fill(); }
        ctx.globalAlpha = sunOp; ctx.restore();
      }
      ctx.restore();
    }

    function render() {
      if (!isTabActive) return;
      var now = Date.now();
      activeTime += Math.min(now - lastTick, 100);
      lastTick = now;

      ctx.clearRect(0, 0, W, H);
      var nt = activeTime * .001;

      var isDayMode = document.body.classList.contains('an-day-mode');
      themeT += ((isDayMode ? 1 : 0) - themeT) * 0.04;

      var sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, 'rgb(' + lerpC('#030110', '#4ba3e3', themeT) + ')');
      sky.addColorStop(.35, 'rgb(' + lerpC('#060318', '#73b9eb', themeT) + ')');
      sky.addColorStop(.65, 'rgb(' + lerpC('#0c082a', '#b3d4f0', themeT) + ')');
      sky.addColorStop(.85, 'rgb(' + lerpC('#16103e', '#ffe299', themeT) + ')');
      sky.addColorStop(1, 'rgb(' + lerpC('#1e1858', '#ffcc66', themeT) + ')');
      ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

      drawHolyCelestial(themeT, nt);

      var starAlpha = Math.max(0, 1 - themeT * 1.5);
      if (starAlpha > 0) {
        STARS.forEach(function (s) {
          s.a = Math.max(.03, Math.min(1, s.a + s.da)); if (s.a >= 1 || s.a <= .03) s.da *= -1;
          if (s.sp) {
            var br = s.a * .9, sz = s.r + 1.4 + Math.sin(nt * 3 + s.ph) * .6;
            ctx.strokeStyle = 'rgba(255,255,230,' + (br * starAlpha) + ')'; ctx.lineWidth = .6;
            ctx.beginPath(); ctx.moveTo(s.x * W - sz, s.y * H); ctx.lineTo(s.x * W + sz, s.y * H); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(s.x * W, s.y * H - sz); ctx.lineTo(s.x * W, s.y * H + sz); ctx.stroke();
          } else {
            ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,' + Math.min(1, s.a * 0.75) * starAlpha + ')';
            ctx.fill();
          }
        });
      }

      ctx.save();
      ctx.globalAlpha = skyA * starAlpha;
      ctx.strokeStyle = 'rgba(180,210,255,.45)'; ctx.lineWidth = 1.8;
      PIL.forEach(function (l) {
        var ax = (PIS[l[0]].x - .5) * 2.5 + .5, ay = (PIS[l[0]].y - .15) * 2.5 + .15;
        var bx = (PIS[l[1]].x - .5) * 2.5 + .5, by = (PIS[l[1]].y - .15) * 2.5 + .15;
        ctx.beginPath(); ctx.moveTo(ax * W, ay * H); ctx.lineTo(bx * W, by * H); ctx.stroke();
      });
      PIS.forEach(function (st, i) {
        var px = (st.x - .5) * 2.5 + .5, py = (st.y - .15) * 2.5 + .15;
        var tw = .5 + .45 * Math.sin(nt * 1.4 + i * .9), rr = i === 0 || i === 7 || i === 12 ? 4 : 2.5;
        var sg = ctx.createRadialGradient(px * W, py * H, 0, px * W, py * H, rr * 4); sg.addColorStop(0, 'rgba(180,210,255,' + tw * .5 + ')'); sg.addColorStop(1, 'transparent');
        ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(px * W, py * H, rr * 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(230,245,255,' + Math.min(1, tw * 1.3) + ')'; ctx.beginPath(); ctx.arc(px * W, py * H, rr, 0, Math.PI * 2); ctx.fill();
      });
      ctx.restore();

      if (starAlpha > 0) {
        (function () {
          var t = nt * 0.18;
          var bands = [
            { y: 0.06, col1: 'rgba(0,255,160,', col2: 'rgba(0,180,255,', amp: 0.035, spd: 0.8, wv: 3.5 },
            { y: 0.12, col1: 'rgba(100,50,220,', col2: 'rgba(150,50,255,', amp: 0.028, spd: 0.6, wv: 2.8 },
            { y: 0.18, col1: 'rgba(0,220,200,', col2: 'rgba(0,140,255,', amp: 0.030, spd: 1.0, wv: 4.5 },
          ];
          bands.forEach(function (b) {
            ctx.save(); ctx.globalAlpha = starAlpha;
            var baseY = b.y * H, tTime = activeTime * 0.0003;
            ctx.beginPath(); ctx.moveTo(0, H); ctx.lineTo(0, baseY);
            for (var xi = 0; xi <= 100; xi++) {
              var xp = (xi / 100) * W;
              var wave = Math.sin(xi / 100 * Math.PI * b.wv + tTime * b.spd * 2) * b.amp * H
                + Math.sin(xi / 100 * Math.PI * b.wv * 1.6 + tTime * b.spd * 1.3 + 1.2) * b.amp * 0.5 * H;
              ctx.lineTo(xp, baseY + wave);
            }
            ctx.lineTo(W, H); ctx.closePath();
            var grad = ctx.createLinearGradient(0, baseY - H * 0.15, 0, H);
            var pulse = 0.04 + 0.03 * Math.sin(nt * 0.3 + b.spd);
            grad.addColorStop(0, b.col1 + '0)'); grad.addColorStop(0.35, b.col1 + (pulse * 0.8) + ')'); grad.addColorStop(0.5, b.col2 + (pulse * 1.1) + ')'); grad.addColorStop(0.65, b.col1 + (pulse * 0.8) + ')'); grad.addColorStop(1, b.col1 + '0)');
            ctx.fillStyle = grad; ctx.fill(); ctx.restore();
          });
        })();
      }

      for (var i = SH.length - 1; i >= 0; i--) {
        var s = SH[i];
        s.trail.push({ x: s.x, y: s.y }); if (s.trail.length > 28) s.trail.shift();
        s.x += s.vx; s.y += s.vy; s.life -= s.decay;
        if (s.life <= 0) { SH.splice(i, 1); continue; }
        for (var tIdx = 1; tIdx < s.trail.length; tIdx++) {
          var pct = tIdx / s.trail.length;
          ctx.beginPath(); ctx.moveTo(s.trail[tIdx - 1].x, s.trail[tIdx - 1].y); ctx.lineTo(s.trail[tIdx].x, s.trail[tIdx].y);
          ctx.strokeStyle = 'rgba(255,240,180,' + pct * s.life * 0.9 * starAlpha + ')'; ctx.lineWidth = pct * 3 * s.life; ctx.stroke();
        }
      }

      if (mtnA > 0) drawMtns(mtnA, themeT);
      if (shipA > 0) drawAirship(shipA, themeT);

      if (casA > 0) {
        drawMist(casA * 0.5, false, themeT);
        drawForest(casA, themeT);
        drawCastle(casA, themeT);
        drawMeadow(casA, themeT);
        drawMist(casA * 0.7, true, themeT);
        drawFireflies(casA, themeT);
        drawCherryBlossomTrees(casA, themeT);
      }

      for (var fi = FW.length - 1; fi >= 0; fi--) {
        var fw = FW[fi];
        if (fw.phase === 'launch') {
          fw.y += fw.vy;
          var lg = ctx.createRadialGradient(fw.x, fw.y, 0, fw.x, fw.y, 8); lg.addColorStop(0, 'rgba(255,220,80,.88)'); lg.addColorStop(1, 'transparent');
          ctx.fillStyle = lg; ctx.beginPath(); ctx.arc(fw.x, fw.y, 8, 0, Math.PI * 2); ctx.fill();
          if (fw.y <= fw.ty) explodeFW(fw);
        } else {
          fw.parts = fw.parts.filter(function (p) { return p.life > 0; });
          fw.parts.forEach(function (p) {
            p.x += p.vx; p.y += p.vy; p.vy += .046; p.vx *= .97; p.vy *= .97; p.life -= p.decay;
            if (p.life <= 0) { p.life = 0; return; }
            var pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.s * p.life * 2.6); pg.addColorStop(0, 'hsla(' + p.hue + ',88%,' + (72 + p.life * 20) + '%,' + p.life * .85 + ')'); pg.addColorStop(1, 'transparent');
            ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(p.x, p.y, p.s * p.life * 2.6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'hsla(' + p.hue + ',90%,' + (80 + p.life * 15) + '%,' + p.life * .75 + ')';
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s * p.life, 0, Math.PI * 2); ctx.fill();
          });
          if (fw.parts.length === 0) FW.splice(fi, 1);
        }
      }

      mainRafId = requestAnimationFrame(render);
    }
    render();

    document.addEventListener('visibilitychange', function () {
      if (document.hidden) {
        isTabActive = false;
        clearTimeout(fwTimeoutId);
        clearTimeout(shootTimeoutId);
        cancelAnimationFrame(mainRafId);
        if (cursorRafId) cancelAnimationFrame(cursorRafId);
      } else {
        isTabActive = true;
        lastTick = Date.now();
        render();
        if (!isTouch) cursorLoop();
        scheduleFW(); scheduleShoot();
        if (themeT < 0.5) { makeFW(W * 0.5, H * 0.4); } else { spawnPetalBurst(W * 0.5, H * 0.5); }
      }
    });

    var PC = ['#c9a227', '#f0c84a', '#faeab1', '#2a9d8f', '#52c9b9', '#fff'], lastP = 0;
    if (!isTouch) {
      document.addEventListener('mousemove', function (ev) { var n = Date.now(); if (n - lastP < 32) return; lastP = n; spark(ev.clientX, ev.clientY); if (Math.random() > .7) spark(ev.clientX, ev.clientY); });
    }
    function spark(x, y, burst) {
      var p = document.createElement('div'); p.className = 'an-spark';
      var c = PC[Math.floor(Math.random() * PC.length)], sz = Math.random() * 5 + 2;
      var sp = burst ? Math.random() * 70 + 28 : Math.random() * 26 + 5, ang = Math.random() * Math.PI * 2;
      p.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;left:' + (x - sz / 2) + 'px;top:' + (y - sz / 2) + 'px;background:' + c + ';box-shadow:0 0 5px ' + c + ';';
      p.style.setProperty('--tx', Math.cos(ang) * sp + 'px'); p.style.setProperty('--ty', Math.sin(ang) * sp + (burst ? 0 : 12) + 'px');
      document.body.appendChild(p); setTimeout(function () { p.remove(); }, 800);
    }

    var SYMS = ['∑', '∫', '≈', 'Δ', 'μ', 'σ', 'λ', '∞', 'θ', 'π', 'β', 'ε', '{}', 'f(x)', 'def', '∂', '∇'];
    var SCOL = ['rgba(201,162,39,O)', 'rgba(42,157,143,O)', 'rgba(240,200,74,O)', 'rgba(210,200,240,O)'];
    var storm = document.createElement('div'); storm.id = 'an-storm'; document.body.appendChild(storm);
    for (var i = 0; i < 22; i++) {
      var el = document.createElement('div'); el.className = 'an-sym';
      var op = (Math.random() * .07 + .04).toFixed(2);
      var col = SCOL[Math.floor(Math.random() * SCOL.length)].replace('O', op);
      el.innerText = SYMS[Math.floor(Math.random() * SYMS.length)];
      el.style.color = col; el.style.textShadow = '0 0 8px ' + col;
      el.style.fontSize = (Math.random() * .85 + .6) + 'rem'; el.style.left = (Math.random() * 100) + 'vw';
      var dur = Math.random() * 16 + 12;
      el.style.animationDuration = dur + 's'; el.style.animationDelay = '-' + (Math.random() * dur) + 's';
      el.style.setProperty('--r', (Math.random() * 360 - 180) + 'deg'); el.style.setProperty('--op', op);
      storm.appendChild(el);
    }

    var obs = new IntersectionObserver(function (entries, o) { entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('reveal-visible'); o.unobserve(e.target); } }); }, { threshold: .1 });
    document.querySelectorAll('.reveal-item').forEach(function (el) { obs.observe(el); });

    document.querySelectorAll('.btn-cta-project,.tech-tag,.back-btn').forEach(function (btn) {
      btn.addEventListener('mousemove', function (ev) { var r = btn.getBoundingClientRect(); btn.style.transform = 'translate(' + (ev.clientX - r.left - r.width / 2) * .14 + 'px,' + (ev.clientY - r.top - r.height / 2) * .14 + 'px) scale(1.04)'; btn.style.transition = 'transform .1s ease-out'; });
      btn.addEventListener('mouseleave', function () { btn.style.transform = ''; btn.style.transition = 'all .45s cubic-bezier(.25,1,.5,1)'; });
    });

    function fixSidebar() {
      document.querySelectorAll('.author__urls-wrapper nav,.author__urls-wrapper .author__urls').forEach(function (el) { el.style.cssText = 'display:flex!important;flex-direction:column!important;gap:8px!important;margin-top:12px!important;padding-top:12px!important;border-top:1px solid rgba(201,162,39,.14)!important;opacity:1!important;visibility:visible!important;position:static!important;width:auto!important;height:auto!important;overflow:visible!important;'; });
      document.querySelectorAll('.author__urls-wrapper button,.author__urls-wrapper [class*=\"btn\"]').forEach(function (el) { el.style.cssText = 'display:none!important;height:0!important;visibility:hidden!important;pointer-events:none!important;margin:0!important;padding:0!important;border:none!important;'; });
      document.querySelectorAll('.author__urls a,.sidebar a').forEach(function (a) { if (a.href && !a.href.startsWith('mailto') && !a.href.includes(window.location.hostname + window.location.pathname)) { a.target = '_blank'; a.rel = 'noopener noreferrer'; } });
    }
    fixSidebar(); setTimeout(fixSidebar, 500); setTimeout(fixSidebar, 1500);

    var topBtn = document.createElement('button'); topBtn.id = 'an-top';
    topBtn.innerHTML = '<img src="/assets/images/kanade-chibi.png" alt="Top"><span>Back to top</span>';
    topBtn.onclick = function () { window.scrollTo({ top: 0, behavior: 'smooth' }); };
    document.body.appendChild(topBtn);
    window.addEventListener('scroll', function () { topBtn.classList.toggle('show', window.scrollY > 300); }, { passive: true });

    window.addEventListener('pageshow', function () {
      document.body.style.overflow = '';
      var ov = document.getElementById('an-overlay'), bk = document.getElementById('an-book');
      if (ov) { ov.style.opacity = '0'; ov.style.pointerEvents = 'none'; }
      if (bk) anBookReset(bk);
      updateAlpha(); fixSidebar();
    });

    (function () {
      var KTHEME = 'an_theme', KTS = 'an_ts', KACT = 'an_act', TTL = 300000;
      setTimeout(function () {
        var d = document.body.classList.contains('an-day-mode');
        ['an-theme-icon-desktop', 'an-theme-icon-mobile'].forEach(function (id) {
          var ic = document.getElementById(id);
          if (!ic) return;
          ic.className = ic.className.replace(/fa-sun|fa-moon/g, '').trim();
          ic.classList.add(d ? 'fa-moon' : 'fa-sun');
        });
      }, 80);

      new MutationObserver(function () {
        try {
          var d = document.body.classList.contains('an-day-mode');
          sessionStorage.setItem(KTHEME, d ? 'day' : 'night'); sessionStorage.setItem(KTS, Date.now());
        } catch (e) { }
      }).observe(document.body, { attributes: true, attributeFilter: ['class'] });

      function ping() { try { sessionStorage.setItem(KACT, Date.now()); } catch (e) { } }
      setInterval(ping, 30000);
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) {
          try {
            if (Date.now() - (+sessionStorage.getItem(KACT) || 0) > TTL) {
              sessionStorage.removeItem(KTHEME); sessionStorage.removeItem(KTS); document.body.classList.remove('an-day-mode');
            }
          } catch (e) { }
        }
        ping();
      });

      document.addEventListener('click', function (e) {
        var btn = e.target.closest('#an-theme-toggle-desktop,#an-theme-toggle-mobile');
        if (!btn) return;
        e.preventDefault(); e.stopImmediatePropagation();
        var blocker = document.getElementById('an-theme-blocker');
        if (blocker) blocker.remove();
        document.body.classList.toggle('an-day-mode');
        var nd = document.body.classList.contains('an-day-mode');
        ['an-theme-icon-desktop', 'an-theme-icon-mobile'].forEach(function (id) {
          var ic = document.getElementById(id);
          if (!ic) return;
          ic.className = ic.className.replace(/fa-sun|fa-moon/g, '').trim();
          ic.classList.add(nd ? 'fa-moon' : 'fa-sun');
        });
      }, true);
    })();
  });

  /* Block click/redirect trên page title & author name */
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.page__title, .author__name').forEach(function (el) {
      var anchor = el.closest('a');
      if (anchor) {
        anchor.addEventListener('click', function (e) { e.preventDefault(); });
        anchor.style.cursor = 'default';
      }
      el.style.cursor = 'default';
    });
  });
</script>
